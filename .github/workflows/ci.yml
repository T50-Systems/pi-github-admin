name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate workflows offline
        run: npm run verify:workflows

      - name: Typecheck, test with coverage, and verify release metadata
        run: npm run verify

      - name: Audit dependency tree
        run: npm audit --audit-level=high

      - name: Inspect publish contents
        run: npm pack --dry-run
