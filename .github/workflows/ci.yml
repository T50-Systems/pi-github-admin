name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate workflows offline
        run: npm run verify:workflows

      - name: Typecheck, test with coverage, and verify release metadata
        run: npm run verify

      - name: Audit dependency tree
        run: npm audit --audit-level=high

      - name: Inspect publish contents
        run: npm pack --dry-run

  pagination-baseline:
    name: Pagination baseline (nonblocking)
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Measure guarded pagination baseline
        run: npm run benchmark:pagination

      - name: Upload machine-readable baseline
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pagination-benchmark-results
          path: artifacts/pagination-benchmark.json
          if-no-files-found: error
          retention-days: 30
