name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate workflows offline
        run: npm run verify:workflows

      - name: Typecheck, test with coverage, and verify release metadata
        run: npm run verify

      - name: Audit dependency tree
        run: npm audit --audit-level=high

      - name: Inspect publish contents
        run: npm pack --dry-run

  pagination-budget:
    name: Pagination regression budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Measure guarded pagination
        run: npm run benchmark:pagination

      - name: Enforce pagination regression budget
        run: npm run benchmark:pagination:enforce

      - name: Upload machine-readable evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pagination-benchmark-results
          path: artifacts/pagination-*.json
          if-no-files-found: error
          retention-days: 30
